<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>You're offline — Supashop</title>
    <link rel="icon" href="/favicon.png" />
    <style>
        :root { color-scheme: light dark; }
        * { box-sizing: border-box; }
        html, body { height: 100%; margin: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #f8fafc;
            color: #0f172a;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        @media (prefers-color-scheme: dark) {
            body { background: #0f172a; color: #e2e8f0; }
            .card { background: #1e293b; border-color: rgba(255,255,255,0.08); }
            .muted { color: #94a3b8; }
        }
        .card {
            width: 100%;
            max-width: 420px;
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            padding: 28px;
            box-shadow: 0 10px 30px rgba(2, 6, 23, 0.08);
            text-align: center;
        }
        .logo {
            width: 56px;
            height: 56px;
            margin: 0 auto 14px;
            display: block;
        }
        h1 { font-size: 20px; margin: 0 0 8px; }
        p { margin: 0 0 16px; line-height: 1.5; }
        .muted { color: #475569; font-size: 14px; }
        button {
            appearance: none;
            border: 0;
            background: #2563eb;
            color: #fff;
            font-weight: 600;
            font-size: 14px;
            padding: 10px 18px;
            border-radius: 8px;
            cursor: pointer;
        }
        button:hover { background: #1d4ed8; }
    </style>
</head>
<body>
    <div class="card">
        <img src="/logo.png" class="logo" alt="Supashop" onerror="this.style.display='none'" />
        <h1>You're offline</h1>
        <p class="muted">
            This page couldn't load because you're not connected. If your dashboard is already open in another tab, you can keep ringing up sales there — they'll sync automatically when your connection comes back.
        </p>
        <button onclick="location.reload()">Try again</button>
    </div>
</body>
</html>
